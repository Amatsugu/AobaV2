syntax = "proto3";

option csharp_namespace = "Aoba.RPC";
package aoba;
import "google/protobuf/empty.proto";

message Credentials{
	string user = 1;
	string password = 2;
}

message SetMediaClassRequest{
	Id id = 1;
	MediaClass class = 2;
}

message SetMediaClassBulkRequest{
	IdList ids = 1;
	MediaClass class = 2;
}


message Jwt{
	string token = 1;
}

message LoginResponse{
	oneof result {
		Jwt jwt = 1;
		LoginError error = 2;
	}
}

message LoginError{
	string message = 1;
}

message PageFilter {
	optional int32 page = 1;
	optional int32 page_size = 2;
	optional string query = 3;
}

message Id {
	string value = 1;
}

message IdList {
	repeated Id value = 1;
}

message MediaResponse {
	optional MediaModel value = 1;
}

message ListResponse {
	repeated MediaModel items = 1;
	Pagination pagination = 2;
}

message Pagination {
	int32 page = 1;
	int32 page_size = 2;
	int32 total_pages = 3;
	int32 total_items = 4;
	optional string query = 5;
}

message UserResponse {
	oneof user_result {
		UserModel user = 1;
		google.protobuf.Empty empty = 2;
	}
}

message UserModel {
	Id id = 1;
	string username = 2;
	string email = 3;
	bool is_admin = 4;
}


message MediaModel {
	Id id = 1;
	string filename = 2;
	MediaType media_type = 3;
	string ext = 4;
	int32 view_count = 5;
	Id owner = 6;
	string thumb_url = 7;
	string media_url = 8;
	MediaClass class = 9;
}

enum MediaType {
	Image = 0;
	Audio = 1;
	Video = 2;
	Text = 3;
	Code = 4;
	Raw = 5;
}

enum MediaClass {
	Standard = 0;
	NSFW = 1;
	Secret = 2;
}

message ShareXResponse {
	oneof dst_result {
		string destination = 1;
		string error = 2;
	}
}


message SearchQuery {
	optional string query_text = 1;
	repeated Filter filters = 2;
}

message Filter {
	string key = 1;
	repeated string values = 2;
}

message PasskeyPayload {

}

message PasskeyCredentialCreateOptions{
	string challenge = 1;
	PublicKeyCredentialUser user = 2;
	PublicKeyCredentialRpEntity rp = 3;
	repeated PubKeyCredParam pubKey_params = 4;
}

message PubKeyCredParam{
	string alg = 1;
	string type = 2;
}

message PublicKeyCredentialRpEntity{
	string id = 1;
	string icon = 2;
	string name = 3;
}

message PublicKeyCredentialUser{
	string id = 1;
	string name = 2;
	string display_name = 3;
}

message PasskeyRegistrationCredentials{
	string id = 1;
	string raw_id = 2;
	string type = 3;
	CredentialsClientResponse response = 4;
}

message CredentialsClientResponse{
	string client_data_json = 1;
	string attestation_object = 2;
	string authenticator_data = 3;
}

message PublicKeyCredentialDescriptor{
	string type = 1;
	string id = 2;
	repeated string transports = 3;
}

message UploadRequest{
	repeated FileInfo files = 1;
}

message FileInfo{
	string filename = 1;
	uint64 size = 2;
}

message UploadTargetResponse {
	oneof result {
		UploadTargets targets = 1;
		string error = 2;
	}
}

message UploadTargets{
	repeated UploadTarget targets = 1;
}

message UploadTarget{
	string signed_url = 1;
	string filename = 2;
	string content_type = 3;
	Id id = 4;
}

message UploadResult {
	oneof result {
		MediaModel media = 1;
		string error_message = 2;
	}
}
